        "淡人": {

      };

      const TYPE_IMAGES = {
        "恨生米煮不成熟饭型": "image/1.jpg",
        "按头型": "image/2.jpg",
        "强制爱型": "image/3.jpg",
        "妈妈": "image/4.jpg",
        "保育员": "image/5.jpg",
        "爱情史官": "image/6.jpg",
        "嗑学家·福尔摩斯·列文虎克": "image/7.jpg",
        "蛀牙患者": "image/8.png",
        "宝宝": "image/9.jpg",
        "脑补大师": "image/10.jpg",
        "大胃王": "image/11.jpg",
        "大厨": "image/12.jpg",
        "淡人": "image/13.png"
      };
      const NORMAL_TYPES = Object.keys(TYPE_LIBRARY);

      // 维度解释
      const DIM_EXPLANATIONS = {
        "K1": {
          "L": "佛系养生，不急不躁，一切随缘。",
          "M": "偶尔会急，但能自我调节。",
          "H": "急性子，等不及，想马上看到结果。"
        },
        "K2": {
          "L": "开放包容，尊重每个人的选择。",
          "M": "有一点占有欲，但能控制。",
          "H": "独占欲强，眼里容不得沙子。"
        },
        "K3": {
          "L": "尊重个人边界，不过度干预。",
          "M": "适度关心，在需要时提供帮助。",
          "H": "保护欲爆棚，像老母鸡护崽。"
        },
        "K4": {
          "L": "理性客观，保持距离。",
          "M": "能共情，会适当安慰。",
          "H": "治愈系，是同担的心灵港湾。"
        },
        "K5": {
          "L": "灵活多变，随遇而安。",
          "M": "有一定忠诚度，但不会过度投入。",
          "H": "长情专一，从一而终。"
        },
        "K6": {
          "L": "粗线条，不拘小节。",
          "M": "观察力一般，偶尔会发现细节。",
          "H": "火眼金睛，任何细节都逃不过你的眼睛。"
        },
        "K7": {
          "L": "甜度感知一般，比较理性。",
          "M": "能感受到甜，但不会过度。",
          "H": "甜度感知超强，血糖爆表。"
        },
        "K8": {
          "L": "喜欢消费内容，较少产出。",
          "M": "偶尔产出，享受创作过程。",
          "H": "高产似母猪，是产粮大户。"
        },
        "K9": {
          "L": "情绪波动大，容易受影响。",
          "M": "情绪稳定，能应对变化。",
          "H": "泰山崩于前而色不变，非常淡定。"
        }
      };

      const dimensionOrder = ['K1','K2','K3','K4','K5','K6','K7','K8','K9'];

      // 应用状态
      const app = {
        shuffledQuestions: [],
        answers: {},
        previewMode: false
      };

      // 屏幕元素
      const screens = {
        intro: document.getElementById('intro'),
        test: document.getElementById('test'),
        result: document.getElementById('result')
      };

      const questionList = document.getElementById('questionList');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const submitBtn = document.getElementById('submitBtn');
      const testHint = document.getElementById('testHint');

      // 显示指定屏幕
      function showScreen(name) {
        Object.entries(screens).forEach(([key, el]) => {
          el.classList.toggle('active', key === name);
          el.classList.toggle('hidden', key !== name);
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // 洗牌函数
      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // 获取可见问题
      function getVisibleQuestions() {
        return [...app.shuffledQuestions];
      }

      // 获取问题元数据标签
      function getQuestionMetaLabel(q) {
        return app.previewMode ? dimensionMeta[q.dim].name : '维度已隐藏';
      }

      // 渲染问题
      function renderQuestions() {
        const visibleQuestions = getVisibleQuestions();
        questionList.innerHTML = '';
        visibleQuestions.forEach((q, index) => {
          const card = document.createElement('article');
          card.className = 'question bg-white rounded-xl p-6 shadow';
          card.innerHTML = `
            <div class="question-meta flex justify-between items-center mb-4">
              <div class="badge bg-theme-primary text-white text-xs px-2 py-1 rounded">第 ${index + 1} 题</div>
              <div class="text-sm text-theme-text-light">${getQuestionMetaLabel(q)}</div>
            </div>
            <div class="question-title text-lg font-medium mb-4">${q.text}</div>
            <div class="options space-y-2">
              ${q.options.map((opt, i) => {
                const code = ['A', 'B', 'C', 'D'][i] || String(i + 1);
                const checked = app.answers[q.id] === opt.value ? 'checked' : '';
                return `
                  <label class="option flex items-center p-3 border rounded-lg hover:bg-theme-secondary cursor-pointer">
                    <input type="radio" name="${q.id}" value="${opt.value}" ${checked} class="mr-3">
                    <div class="option-code font-medium mr-2">${code}.</div>
                    <div>${opt.label}</div>
                  </label>
                `;
              }).join('')}
            </div>
          `;
          questionList.appendChild(card);
        });

        // 绑定事件监听器
        questionList.querySelectorAll('input[type="radio"]').forEach(input => {
          input.addEventListener('change', (e) => {
            const { name, value } = e.target;
            app.answers[name] = Number(value);
            updateProgress();
          });
        });

        updateProgress();
      }

      // 更新进度
      function updateProgress() {
        const visibleQuestions = getVisibleQuestions();
        const total = visibleQuestions.length;
        const done = visibleQuestions.filter(q => app.answers[q.id] !== undefined).length;
        const percent = total ? (done / total) * 100 : 0;
        progressBar.style.width = `${percent}%`;
        progressText.textContent = `${done} / ${total}`;
        const complete = done === total && total > 0;
        submitBtn.disabled = !complete;
        testHint.textContent = complete
          ? '都做完了。现在可以把你的电子魂魄交给结果页审判。'
          : '全选完才会放行。世界已经够乱了，起码把题做完整。';
      }

      // 每种CP粉类型的维度特征预设
      const typeDimensionProfiles = {
        '恨生米煮不成熟饭型': { K1: 'H', K2: 'H', K3: 'L', K4: 'L', K5: 'M', K6: 'M', K7: 'H', K8: 'L', K9: 'L' },
        '按头型': { K1: 'H', K2: 'H', K3: 'M', K4: 'M', K5: 'L', K6: 'L', K7: 'H', K8: 'L', K9: 'L' },
        '强制爱型': { K1: 'M', K2: 'H', K3: 'H', K4: 'L', K5: 'H', K6: 'M', K7: 'H', K8: 'L', K9: 'M' },
        '妈妈': { K1: 'M', K2: 'M', K3: 'H', K4: 'H', K5: 'H', K6: 'M', K7: 'M', K8: 'M', K9: 'M' },
        '保育员': { K1: 'L', K2: 'L', K3: 'H', K4: 'H', K5: 'M', K6: 'M', K7: 'M', K8: 'L', K9: 'H' },
        '爱情史官': { K1: 'L', K2: 'M', K3: 'M', K4: 'M', K5: 'H', K6: 'H', K7: 'H', K8: 'M', K9: 'M' },
        '嗑学家·福尔摩斯·列文虎克': { K1: 'M', K2: 'M', K3: 'L', K4: 'L', K5: 'H', K6: 'H', K7: 'H', K8: 'H', K9: 'M' },
        '蛀牙患者': { K1: 'M', K2: 'M', K3: 'L', K4: 'M', K5: 'M', K6: 'L', K7: 'H', K8: 'L', K9: 'L' },
        '宝宝': { K1: 'M', K2: 'M', K3: 'M', K4: 'H', K5: 'M', K6: 'L', K7: 'H', K8: 'L', K9: 'L' },
        '脑补大师': { K1: 'M', K2: 'M', K3: 'L', K4: 'L', K5: 'M', K6: 'H', K7: 'H', K8: 'H', K9: 'M' },
        '大胃王': { K1: 'L', K2: 'L', K3: 'L', K4: 'M', K5: 'M', K6: 'L', K7: 'H', K8: 'M', K9: 'H' },
        '大厨': { K1: 'L', K2: 'L', K3: 'M', K4: 'H', K5: 'M', K6: 'M', K7: 'H', K8: 'H', K9: 'M' },
        '淡人': { K1: 'L', K2: 'L', K3: 'L', K4: 'M', K5: 'M', K6: 'M', K7: 'M', K8: 'L', K9: 'H' }
      };

      // 计算结果
      function computeResult() {
        // 统计每个维度的总分和题目数量
        const dimScores = {};
        const dimCounts = {};
        Object.keys(dimensionMeta).forEach(dim => {
          dimScores[dim] = 0;
          dimCounts[dim] = 0;
        });

        // 遍历所有题目，累加用户回答的分数
        questions.forEach(q => {
          const answer = app.answers[q.id];
          if (answer !== undefined) {
            dimScores[q.dim] += Number(answer);
            dimCounts[q.dim]++;
          }
        });

        // 计算每个维度的平均分，并映射为L/M/H等级
        const userLevels = {};
        const levels = {};
        Object.keys(dimensionMeta).forEach(dim => {
          const avg = dimCounts[dim] > 0 ? dimScores[dim] / dimCounts[dim] : 2.5;
          let level;
          if (avg <= 1.5) level = 'L';
          else if (avg <= 2.5) level = 'M';
          else level = 'H';
          userLevels[dim] = level;
          levels[dim] = level;
        });

        // 将用户维度水平与每个类型比较，计算匹配度
        let bestType = null;
        let bestMatch = -1;
        let bestMatchRate = 0;

        Object.entries(typeDimensionProfiles).forEach(([typeName, profile]) => {
          let matchCount = 0;
          dimensionOrder.forEach(dim => {
            if (userLevels[dim] === profile[dim]) {
              matchCount++;
            }
          });
          const matchRate = matchCount / 9;

          if (matchRate > bestMatchRate) {
            bestMatchRate = matchRate;
            bestMatch = matchCount;
            bestType = TYPE_LIBRARY[typeName];
            bestType.name = typeName;
          }
        });

        const similarity = Math.round(bestMatchRate * 100);
        const badge = `维度匹配度 ${similarity}% · 一致维度 ${bestMatch}/9`;

        return {
          rawScores: dimScores,
          levels: userLevels,
          ranked: [bestType],
          bestNormal: bestType,
          finalType: bestType,
          modeKicker: '你的CP粉类型',
          badge: badge,
          sub: '根据你的维度特征，这是最符合你的CP粉类型。',
          special: false,
          secondaryType: null
        };
      }

      // 渲染维度列表
      function renderDimList(result) {
        const dimList = document.getElementById('dimList');
        dimList.innerHTML = dimensionOrder.map(dim => {
          const level = result.levels[dim];
          const explanation = DIM_EXPLANATIONS[dim][level];
          const levelText = level === 'H' ? '高' : level === 'L' ? '低' : '中';
          return `
            <div class="dim-item p-4 border rounded-lg">
              <div class="dim-item-top flex justify-between items-center mb-2">
                <div class="dim-item-name font-medium">${dimensionMeta[dim].name}</div>
                <div class="dim-item-score text-sm text-theme-text-light">${levelText}</div>
              </div>
              <p class="text-sm text-theme-text-light">${explanation}</p>
            </div>
          `;
        }).join('');
      }

      // 渲染结果
      function renderResult() {
        const result = computeResult();
        const type = result.finalType;

        document.getElementById('resultModeKicker').textContent = result.modeKicker;
        document.getElementById('resultTypeName').textContent = type.cn;
        document.getElementById('matchBadge').textContent = result.badge;
        document.getElementById('resultTypeSub').textContent = result.sub;
        document.getElementById('resultDesc').textContent = type.desc;
        document.getElementById('funNote').textContent = '本测试仅供娱乐，如有雷同，并非巧合。JMJ cross！';

        // 显示对应的图片
        const posterImage = document.getElementById('posterImage');
        const imageUrl = TYPE_IMAGES[type.name];
        if (imageUrl) {
          let imageHtml = `<img src="${imageUrl}" class="w-48 h-48 md:w-64 md:h-64 object-cover rounded-full" alt="${type.cn}">`;
          if (type.name === '大厨') {
            imageHtml += `<div class="absolute bottom-1 right-1 text-xs text-white bg-black/50 px-1 rounded">@Rinbox-w</div>`;
            posterImage.className = 'w-48 h-48 md:w-64 md:h-64 bg-theme-secondary rounded-full flex items-center justify-center relative overflow-hidden';
          }
          posterImage.innerHTML = imageHtml;
        } else {
          posterImage.innerHTML = '<span class="text-4xl">🎉</span>';
        }

        renderDimList(result);
        showScreen('result');
      }

      // 开始测试
      function startTest(preview = false) {
        app.previewMode = preview;
        app.answers = {};
        app.shuffledQuestions = shuffle(questions);
        renderQuestions();
        showScreen('test');
      }

      // 确保DOM加载完成后执行
      document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM加载完成');
        
        // 绑定事件监听器
        document.getElementById('startBtn').addEventListener('click', function() {
          console.log('开始测试按钮被点击');
          startTest(false);
        });
        
        document.getElementById('backIntroBtn').addEventListener('click', function() {
          showScreen('intro');
        });
        
        document.getElementById('submitBtn').addEventListener('click', function() {
          renderResult();
        });
        
        document.getElementById('restartBtn').addEventListener('click', function() {
          startTest(false);
        });
        
        document.getElementById('toTopBtn').addEventListener('click', function() {
          showScreen('intro');
        });
        
        console.log('事件监听器已绑定');
      });
    </script>
  </body>
